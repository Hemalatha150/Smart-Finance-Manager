<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Finance Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="glass">
        <div class="logo">
            <span>💰</span> Smart Finance
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span id="userGreeting" style="font-weight: 600;">Welcome, User</span>
            <button class="btn" style="padding: 8px 16px; font-size: 0.8rem;" onclick="logout()">Logout</button>
        </div>
    </nav>

    <main class="dashboard-main">
        <div class="grid-stats">
            <div class="stat-card glass">
                <div class="label">Total Balance</div>
                <div class="value" id="totalBalance">₹0.00</div>
            </div>
            <div class="stat-card glass">
                <div class="label">Total Income</div>
                <div class="value text-success" id="totalIncome">₹0.00</div>
            </div>
            <div class="stat-card glass">
                <div class="label">Total Expenses</div>
                <div class="value text-danger" id="totalExpenses">₹0.00</div>
            </div>
        </div>

        <div class="grid-charts">
            <div class="chart-card glass">
                <h3>Monthly Trend</h3>
                <canvas id="trendChart"></canvas>
            </div>
            <div class="chart-card glass">
                <h3>Expense Breakdown</h3>
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 40px;">
            <!-- Add Transaction -->
            <div class="glass" style="padding: 30px;">
                <h3>Add Transaction</h3>
                <form id="transactionForm" style="margin-top: 20px;">
                    <div class="form-group">
                        <label>Type</label>
                        <select id="tType" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 12px; color: white;">
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="tAmount" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Category / Source</label>
                        <input type="text" id="tCategory" placeholder="e.g. Salary, Rent, Food" required>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="tDate" required>
                    </div>
                    <button type="submit" class="btn">Add Transaction</button>
                </form>
            </div>

            <!-- Set Budget -->
            <div class="glass" style="padding: 30px;">
                <h3>Set Monthly Budget</h3>
                <form id="budgetForm" style="margin-top: 20px;">
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="bCategory" placeholder="e.g. Food" required>
                    </div>
                    <div class="form-group">
                        <label>Budget Amount (₹)</label>
                        <input type="number" id="bAmount" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Month</label>
                        <input type="month" id="bMonth" required>
                    </div>
                    <button type="submit" class="btn" style="background: linear-gradient(to right, var(--accent), #d97706);">Set Budget</button>
                </form>
            </div>
        </div>

        <div class="table-card glass">
            <h3>Recent Activity</h3>
            <div id="recentActivity">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Type</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="activityBody">
                        <!-- Data injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <div style="margin-top: 40px; text-align: center;">
             <button class="btn" id="runMlBtn" style="max-width:300px;">🤖 Run AI Insights</button>
        </div>
        
        <div id="mlResults" class="glass" style="margin-top: 20px; padding: 30px; display: none;">
            <h3>AI Financial Insights</h3>
            <div id="mlContent" style="color: var(--text-muted); margin-top: 10px;"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
